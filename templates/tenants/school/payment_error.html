{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Failed | {{ tenant.name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root{--navy:#050c1a;--panel:#0f1e38;--border:rgba(255,255,255,.08);--gold:#e8b84b;--red:#f87171;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:"Segoe UI",system-ui,sans-serif;background:var(--navy);color:#dde4f0;
         min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
    .card{max-width:480px;width:100%;background:var(--panel);border:1px solid var(--border);
          border-radius:20px;padding:2.5rem;text-align:center;}
    .icon{width:72px;height:72px;background:rgba(248,113,113,.1);border:2px solid rgba(248,113,113,.25);
          border-radius:50%;display:flex;align-items:center;justify-content:center;
          margin:0 auto 1.5rem;font-size:2rem;color:var(--red);}
    h1{font-size:1.6rem;font-weight:800;color:#fff;margin-bottom:.5rem;}
    .sub{color:rgba(255,255,255,.5);font-size:.9rem;margin-bottom:1.5rem;line-height:1.6;}
    .error-box{background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.2);border-radius:10px;
               padding:1rem;margin-bottom:1.75rem;font-size:.85rem;color:var(--red);text-align:left;}
    .btn{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.5rem;border-radius:10px;
         font-size:.9rem;font-weight:700;text-decoration:none;border:none;cursor:pointer;font-family:inherit;}
    .btn-gold{background:linear-gradient(135deg,var(--gold),#c8901a);color:#000;width:100%;justify-content:center;margin-bottom:.75rem;}
    .btn-ghost{background:rgba(255,255,255,.06);border:1px solid var(--border);color:#dde4f0;width:100%;justify-content:center;}
    .help{margin-top:1.5rem;font-size:.8rem;color:rgba(255,255,255,.3);}
    .help a{color:var(--gold);}
  </style>
</head>
<body>
<div class="card">
  <div class="icon"><i class="bi bi-x-lg"></i></div>
  <h1>Payment Failed</h1>
  <p class="sub">We could not process your payment. Please review the error below and try again.</p>

  {% if error %}
  <div class="error-box"><i class="bi bi-exclamation-circle"></i> {{ error }}</div>
  {% endif %}

  <a href="/subscription/upgrade/" class="btn btn-gold"><i class="bi bi-arrow-repeat"></i> Try Again</a>
  <a href="/subscription/" class="btn btn-ghost"><i class="bi bi-arrow-left"></i> Back to Subscription</a>

  <p class="help">
    Need help? Contact us at <a href="mailto:support@titmiary.edu.ng">support@titmiary.edu.ng</a>
  </p>
</div>
</body>
</html>
