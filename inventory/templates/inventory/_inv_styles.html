<style>
:root {
  --inv-primary: #1e3a8a;
  --inv-accent: #3b82f6;
  --inv-success: #16a34a;
  --inv-warning: #d97706;
  --inv-danger: #dc2626;
  --inv-muted: #6b7280;
  --inv-light: #f8fafc;
  --inv-card: #ffffff;
  --inv-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

.inv-page { max-width: 1400px; margin: 0 auto; padding: 24px 20px; }

.inv-header {
  background: linear-gradient(135deg, var(--inv-primary), var(--inv-accent));
  border-radius: 16px; padding: 28px 32px; margin-bottom: 28px; color: #fff;
  position: relative; overflow: hidden;
}
.inv-header::after {
  content: ''; position: absolute; top: -40%; right: -5%; width: 250px; height: 250px;
  background: rgba(255,255,255,0.08); border-radius: 50%; pointer-events: none;
}
.inv-header h1 { font-size: 1.8rem; font-weight: 800; margin: 0 0 6px; display: flex; align-items: center; gap: 12px; }
.inv-header p { margin: 0; opacity: .9; font-size: .95rem; }

.inv-card {
  background: var(--inv-card); border-radius: 14px;
  box-shadow: var(--inv-shadow); overflow: hidden; margin-bottom: 24px;
}
.inv-card-header {
  padding: 18px 24px; border-bottom: 1px solid #f1f5f9;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  background: #fafbff;
}
.inv-card-header h2 { font-size: 1.1rem; font-weight: 700; color: var(--inv-primary); margin: 0; display: flex; align-items: center; gap: 8px; }
.inv-card-body { padding: 24px; }

.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 18px; margin-bottom: 28px; }
.kpi-card {
  background: #fff; border-radius: 14px; padding: 22px; box-shadow: var(--inv-shadow);
  border-left: 4px solid var(--inv-accent); display: flex; align-items: center; gap: 16px;
}
.kpi-card.danger { border-color: var(--inv-danger); }
.kpi-card.success { border-color: var(--inv-success); }
.kpi-card.warning { border-color: var(--inv-warning); }
.kpi-icon { width: 52px; height: 52px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; flex-shrink: 0; background: #eff6ff; }
.kpi-card.danger .kpi-icon { background: #fef2f2; }
.kpi-card.success .kpi-icon { background: #f0fdf4; }
.kpi-card.warning .kpi-icon { background: #fffbeb; }
.kpi-label { font-size: .78rem; text-transform: uppercase; letter-spacing: .5px; color: var(--inv-muted); font-weight: 600; }
.kpi-value { font-size: 2rem; font-weight: 800; color: #111827; line-height: 1; margin-top: 4px; }

.inv-table { width: 100%; border-collapse: collapse; font-size: .9rem; }
.inv-table thead { background: linear-gradient(135deg, var(--inv-primary), var(--inv-accent)); }
.inv-table th { padding: 14px 16px; color: #fff; font-weight: 700; font-size: .8rem; text-transform: uppercase; letter-spacing: .4px; white-space: nowrap; text-align: left; }
.inv-table td { padding: 13px 16px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; color: #374151; }
.inv-table tbody tr:hover { background: #f8fafc; }
.inv-table tbody tr:last-child td { border-bottom: none; }

.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 20px; font-size: .78rem; font-weight: 700; white-space: nowrap;
}
.badge-success { background: #dcfce7; color: #166534; }
.badge-danger { background: #fee2e2; color: #991b1b; }
.badge-warning { background: #fef3c7; color: #92400e; }
.badge-info { background: #dbeafe; color: #1e40af; }
.badge-muted { background: #f1f5f9; color: #475569; }

.btn-inv {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 18px; border-radius: 10px; font-weight: 700; font-size: .88rem;
  border: none; cursor: pointer; transition: all .25s; text-decoration: none;
}
.btn-inv-primary { background: linear-gradient(135deg, var(--inv-primary), var(--inv-accent)); color: #fff; }
.btn-inv-success { background: linear-gradient(135deg, #16a34a, #15803d); color: #fff; }
.btn-inv-warning { background: linear-gradient(135deg, #d97706, #b45309); color: #fff; }
.btn-inv-danger  { background: linear-gradient(135deg, #dc2626, #b91c1c); color: #fff; }
.btn-inv-outline { background: #fff; color: var(--inv-primary); border: 2px solid var(--inv-primary); }
.btn-inv-sm { padding: 6px 12px; font-size: .8rem; border-radius: 8px; }
.btn-inv:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0,0,0,.15); }

.form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 18px; margin-bottom: 18px; }
.form-group label { display: block; font-weight: 700; color: #374151; margin-bottom: 6px; font-size: .88rem; }
.form-group label .required { color: var(--inv-danger); }
.form-control, .form-select {
  width: 100%; padding: 11px 14px; border: 2px solid #e5e7eb; border-radius: 10px;
  font-size: .9rem; transition: border-color .2s, box-shadow .2s; background: #fff;
}
.form-control:focus, .form-select:focus {
  border-color: var(--inv-accent); outline: none;
  box-shadow: 0 0 0 3px rgba(59,130,246,.12);
}

.alert-inv { padding: 14px 18px; border-radius: 10px; font-size: .9rem; margin-bottom: 16px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
.alert-inv-danger { background: #fef2f2; color: #991b1b; border-left: 4px solid #dc2626; }
.alert-inv-warning { background: #fffbeb; color: #92400e; border-left: 4px solid #f59e0b; }
.alert-inv-info { background: #eff6ff; color: #1e40af; border-left: 4px solid #3b82f6; }

.stock-bar-wrap { background: #e5e7eb; border-radius: 4px; height: 8px; min-width: 80px; }
.stock-bar { height: 8px; border-radius: 4px; background: var(--inv-success); transition: width .4s; }
.stock-bar.low { background: var(--inv-danger); }
.stock-bar.medium { background: var(--inv-warning); }

.filter-bar {
  background: #fff; border-radius: 12px; padding: 18px 20px;
  box-shadow: var(--inv-shadow); margin-bottom: 22px; display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end;
}
.filter-bar .form-group { margin: 0; flex: 1; min-width: 160px; }

.empty-state { text-align: center; padding: 70px 20px; color: var(--inv-muted); }
.empty-state .es-icon { font-size: 4rem; margin-bottom: 16px; opacity: .4; }
.empty-state h3 { font-size: 1.2rem; color: #374151; margin-bottom: 8px; }

@media (max-width: 768px) {
  .inv-page { padding: 16px 12px; }
  .inv-table thead { display: none; }
  .inv-table, .inv-table tbody, .inv-table tr, .inv-table td { display: block; }
  .inv-table tr { margin-bottom: 16px; border-radius: 10px; border: 1px solid #e5e7eb; overflow: hidden; }
  .inv-table td { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; font-size: .85rem; }
  .inv-table td::before { content: attr(data-label); font-weight: 700; color: #374151; }
}
</style>
